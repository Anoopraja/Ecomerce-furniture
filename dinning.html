<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dining | MODERNO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f5f5;
      color:#111;
    }

    /* NAVBAR */
    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 8%;
      background:#e9e9e9;
    }

    .logo{
      font-size:28px;
      font-weight:600;
      letter-spacing:2px;
      color: #111;
      text-decoration: none;
    }
    .logo:hover {
      cursor: pointer;
    }

    .nav-links{
      display:flex;
      gap:40px;
      list-style:none;
    }

    .nav-links a{
      text-decoration:none;
      color:#111;
      font-size:16px;
    }

    .icons{
      display:flex;
      gap:20px;
      font-size:18px;
      cursor:pointer;
    }

    /* HERO SECTION */
    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:80px 8%;
      min-height:90vh;
      gap:50px;
    }

    .hero-text{
      flex:1;
    }

    .hero-text h1{
      font-size:60px;
      font-weight:600;
      margin-bottom:10px;
    }

    .hero-text h2{
      font-size:55px;
      font-weight:300;
      color:#777;
      margin-bottom:25px;
    }

    .hero-text p{
      font-size:18px;
      color:#666;
      line-height:1.6;
      margin-bottom:35px;
      max-width:500px;
    }

    .btn-group{
      display:flex;
      gap:20px;
    }

    .btn{
      padding:14px 28px;
      border-radius:10px;
      font-size:15px;
      cursor:pointer;
      transition:0.3s ease;
    }

    .primary-btn{
      background:black;
      color:white;
      border:none;
    }

    .primary-btn:hover{
      background:#333;
    }

    .secondary-btn{
      background:transparent;
      border:1px solid #999;
    }

    .secondary-btn:hover{
      background:#ddd;
    }

    .hero-image{
      flex:1;
      display:flex;
      justify-content:center;
    }

    .hero-image img{
      width:100%;
      max-width:450px;
      border-radius:20px;
    }

    /* RESPONSIVE */
    @media(max-width:900px){
      .hero{
        flex-direction:column;
        text-align:center;
      }

      .hero-text h1{
        font-size:40px;
      }

      .hero-text h2{
        font-size:35px;
      }

      .btn-group{
        justify-content:center;
      }
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo">MODERNO</a>

    <ul class="nav-links">
      <li><a href="livingroom.html">LivingRoom</a></li>
      <li><a href="bedroom.html">Bedroom</a></li>
      <li><a href="dinning.html">Dining</a></li>
    </ul>

    <div class="icons">
      <img src="/image/search.png" style="width: 18px;" alt="search" srcset="">
      <img src="/image/account.png" style="width: 18px;" alt="account" srcset="">
      <img src="/image/cart.png" style="width: 18px;" alt="cart" srcset="">
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    
    <div class="hero-text">
      <h1>Modern Dining</h1>
      <h2>Where Style Meets Gathering</h2>
      <p>
        Elevate your dining experience with our curated selection of
        elegant dining tables, chairs, and décor pieces crafted for
        memorable meals and meaningful conversations.
      </p>

      <div class="btn-group">
        <button class="btn primary-btn">Shop Dining</button>
        <button class="btn secondary-btn">View Collection</button>
      </div>
    </div>

    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1604578762246-41134e37f9cc" alt="Dining Room">
    </div>

  </section>

</body>
</html>
